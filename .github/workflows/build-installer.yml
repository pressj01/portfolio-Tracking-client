name: Build Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build (all, windows, mac)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - windows
          - mac

permissions:
  contents: write

jobs:
  build-windows:
    if: ${{ github.event.inputs.platform != 'mac' }}
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Python dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Build Flask backend executable
        run: |
          cd backend
          pyinstaller --noconfirm --clean --distpath ../installer/flask-dist --workpath ../installer/flask-build --name backend app.py --hidden-import flask --hidden-import flask_cors --hidden-import pandas --hidden-import openpyxl --hidden-import yfinance --hidden-import plotly --hidden-import scipy --hidden-import pypdf --hidden-import sqlite3 --hidden-import statistics --hidden-import decimal --hidden-import config --hidden-import database --hidden-import import_data --hidden-import normalize --hidden-import grading --hidden-import create_template --hidden-import tax_report --hidden-import dividend_safety --hidden-import transaction_import --hidden-import portfolio_tester --hidden-import options_pricing --hidden-import options_api --add-data "config.py;." --add-data "database.py;." --add-data "import_data.py;." --add-data "normalize.py;." --add-data "grading.py;." --add-data "create_template.py;." --add-data "tax_report.py;." --add-data "dividend_safety.py;." --add-data "transaction_import.py;." --add-data "portfolio_tester.py;." --add-data "options_pricing.py;." --add-data "options_api.py;." --add-data "seed;seed"

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend and Windows installer
        run: npm run build && npx electron-builder --win --publish never

      - name: Smoke test packaged Windows app
        shell: powershell
        run: |
          $releaseRoot = (Resolve-Path "release\win-unpacked").Path
          $testData = Join-Path $env:RUNNER_TEMP "portfolio-tracking-smoke"
          New-Item -ItemType Directory -Path $testData -Force | Out-Null
          $env:PORTFOLIO_DB_DIR = $testData
          $exe = Join-Path $releaseRoot "Portfolio Tracking Client.exe"

          try {
            Start-Process -FilePath $exe `
              -ArgumentList "--user-data-dir=$testData" `
              -WorkingDirectory $releaseRoot `
              -WindowStyle Hidden

            $ready = $false
            for ($attempt = 0; $attempt -lt 120; $attempt++) {
              try {
                Invoke-RestMethod -Uri "http://127.0.0.1:5001/api/profiles" -TimeoutSec 2 | Out-Null
                $ready = $true
                break
              }
              catch {
                Start-Sleep -Milliseconds 500
              }
            }

            $startupLog = Join-Path $testData "startup.log"
            if (-not $ready) {
              if (Test-Path $startupLog) {
                Get-Content $startupLog
              }
              throw "The packaged Windows application did not become ready."
            }
            if (-not (Test-Path (Join-Path $testData "portfolio.db"))) {
              throw "The packaged backend did not create its per-user database."
            }
            Get-Content $startupLog
          }
          finally {
            Get-CimInstance Win32_Process |
              Where-Object {
                $_.ExecutablePath -and
                $_.ExecutablePath.StartsWith($releaseRoot, [StringComparison]::OrdinalIgnoreCase)
              } |
              ForEach-Object {
                Stop-Process -Id $_.ProcessId -Force -ErrorAction SilentlyContinue
              }
          }

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: PortfolioTrackingClient-Windows
          path: release/*.exe

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            release/*.exe
            release/*.blockmap
          generate_release_notes: true

  build-mac:
    if: ${{ github.event.inputs.platform != 'windows' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-latest
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Python dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Build Flask backend executable
        run: |
          cd backend
          pyinstaller --noconfirm --clean --distpath ../installer/flask-dist --workpath ../installer/flask-build --name backend app.py --hidden-import flask --hidden-import flask_cors --hidden-import pandas --hidden-import openpyxl --hidden-import yfinance --hidden-import plotly --hidden-import scipy --hidden-import pypdf --hidden-import sqlite3 --hidden-import statistics --hidden-import decimal --hidden-import config --hidden-import database --hidden-import import_data --hidden-import normalize --hidden-import grading --hidden-import create_template --hidden-import tax_report --hidden-import dividend_safety --hidden-import transaction_import --hidden-import portfolio_tester --hidden-import options_pricing --hidden-import options_api --add-data "config.py:." --add-data "database.py:." --add-data "import_data.py:." --add-data "normalize.py:." --add-data "grading.py:." --add-data "create_template.py:." --add-data "tax_report.py:." --add-data "dividend_safety.py:." --add-data "transaction_import.py:." --add-data "portfolio_tester.py:." --add-data "options_pricing.py:." --add-data "options_api.py:." --add-data "seed:seed"

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend and Mac installer
        run: npm run build && npx electron-builder --mac dmg --${{ matrix.arch }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload Mac installer
        uses: actions/upload-artifact@v4
        with:
          name: PortfolioTrackingClient-Mac-${{ matrix.arch }}
          path: release/*.dmg

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: release/*.dmg
