name: Build Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Python dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Build Flask backend executable
        run: |
          cd backend
          pyinstaller --noconfirm --clean --distpath ../installer/flask-dist --workpath ../installer/flask-build --name backend app.py --hidden-import flask --hidden-import flask_cors --hidden-import pandas --hidden-import openpyxl --hidden-import yfinance --hidden-import plotly --hidden-import sqlite3 --hidden-import statistics --hidden-import decimal --hidden-import config --hidden-import database --hidden-import import_data --hidden-import normalize --hidden-import grading --hidden-import create_template --add-data "config.py;." --add-data "database.py;." --add-data "import_data.py;." --add-data "normalize.py;." --add-data "grading.py;." --add-data "create_template.py;."

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend and Windows installer
        run: npm run build && npx electron-builder --win --publish never

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: PortfolioTrackingClient-Windows
          path: release/*.exe

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            release/*.exe
            release/*.blockmap
          generate_release_notes: true

  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Python dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Build Flask backend executable
        run: |
          cd backend
          pyinstaller --noconfirm --clean --distpath ../installer/flask-dist --workpath ../installer/flask-build --name backend app.py --hidden-import flask --hidden-import flask_cors --hidden-import pandas --hidden-import openpyxl --hidden-import yfinance --hidden-import plotly --hidden-import sqlite3 --hidden-import statistics --hidden-import decimal --hidden-import config --hidden-import database --hidden-import import_data --hidden-import normalize --hidden-import grading --hidden-import create_template --add-data "config.py:." --add-data "database.py:." --add-data "import_data.py:." --add-data "normalize.py:." --add-data "grading.py:." --add-data "create_template.py:."

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend and Mac installer
        run: npm run build && npx electron-builder --mac --publish never

      - name: Upload Mac installer
        uses: actions/upload-artifact@v4
        with:
          name: PortfolioTrackingClient-Mac
          path: |
            release/*.dmg
            release/*.zip

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            release/*.dmg
            release/*.zip
